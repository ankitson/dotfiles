{{/* =====================================================================
     The trusted Tailscale devices come from the shared inventory stored in
     1Password at op://clankers/tailscale-inventory/notesPlain — edit the
     allowlist THERE (set a device's `trusted: true/false`). Local networks are
     defined just below. Both the `Match Address` rule and the comment table at
     the bottom are generated.
     ===================================================================== */ -}}
{{- $tailscaleInventory := (onepasswordRead "op://clankers/tailscale-inventory/notesPlain" | fromYaml) -}}
{{- $tailscale := $tailscaleInventory.tailscale -}}
{{- $localNets := list "172.16.0.0/16" "172.21.0.0/16" "127.0.0.1" "::1" -}}
{{- /* Collect IPs of every device flagged `trusted`, then append local nets. */ -}}
{{- $addrs := list -}}
{{- range $tailscale.devices }}{{ if .trusted }}{{ $addrs = append $addrs .ipv4 }}{{ $addrs = append $addrs .ipv6 }}{{ end }}{{ end -}}
{{- $addrs = concat $addrs $localNets -}}
{{- /* Build the negated pattern list: !addr1,!addr2,… */ -}}
{{- $neg := list }}{{ range $addrs }}{{ $neg = append $neg (printf "!%s" .) }}{{ end -}}
# Managed by chezmoi — installed to /etc/ssh/sshd_config.d/010-tailscale-secure.conf
# Source: ~/.local/share/chezmoi/.chezmoitemplates/sshd_config_tailscale_secure.conf
# Installer: run_onchange_after_configure-macos-sshd.sh.tmpl
#
# Loaded first (010 sorts before 100-macos.conf) via the
#   Include /etc/ssh/sshd_config.d/*
# directive near the top of /etc/ssh/sshd_config. sshd takes the FIRST obtained
# value for most options, so the hardening below wins over the stock defaults
# further down the main config. The config is re-read on every new connection
# (macOS launches sshd per-connection via launchd), so no daemon reload is needed.
#
# NOTE: this file is GENERATED. The device allowlist comes from the shared
# inventory in 1Password at op://clankers/tailscale-inventory/notesPlain
# (per-device `trusted:` flag); edit there, not here, then `chezmoi apply`.

# ---- Authentication hardening ----
PermitRootLogin no
PubkeyAuthentication yes
AuthenticationMethods publickey
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitEmptyPasswords no
MaxAuthTries 3
LoginGraceTime 30

# ---- Reduce attack surface ----
AllowAgentForwarding no
AllowTcpForwarding no
X11Forwarding no
PermitTunnel no

# ---- Idle session reaping ----
ClientAliveInterval 300
ClientAliveCountMax 2

# ---- Source-address allowlist ----
# Refuse every login whose source address is NOT explicitly allowed. Rather than
# the whole Tailscale CGNAT range (100.64.0.0/10 — which would also admit other
# devices sharing this tailnet), we pin specific devices by their stable IPs.
#
# Allowed Tailscale devices (trusted: true in the 1Password inventory):
{{- range $tailscale.devices }}{{ if .trusted }}
#   {{ printf "%-18s %-16s %s" .name .ipv4 .ipv6 }}
{{- end }}{{ end }}
# Plus trusted local networks: {{ join "  " $localNets }}
#
# Technique: this Match matches every address EXCEPT the allowed set (each
# allowed address/range is negated out of the leading `*`), then denies all
# users for those non-allowed addresses. Connections from the allowed addresses
# fall through to the normal (pubkey-only) config above. Match Address must be a
# single line — it cannot be wrapped or carry inline comments.
Match Address "*,{{ join "," $neg }}"
    DenyUsers *
