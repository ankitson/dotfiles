# Opt-in Bifrost profile. Use with:
#   codex --profile bifrost
#
# Bifrost is the devserver LLM gateway. Its OpenAI-compatible route is exposed
# at /openai/v1 and owns the real upstream provider credentials.
model_provider = "bifrost"

[model_providers.bifrost]
name = "Bifrost"
base_url = "https://bifrost.dev.ankitson.com/openai/v1"
wire_api = "responses"
experimental_bearer_token = "bifrost-local"
requires_openai_auth = false
# Bifrost's Responses WebSocket path selects a provider before governance
# routing. SSE keeps routing consistent when Codex's model picker emits a bare
# GPT slug. The profile intentionally does not pin a model.
supports_websockets = false
request_max_retries = 4
stream_max_retries = 10
stream_idle_timeout_ms = 300000
http_headers = { "x-bf-passthrough-extra-params" = "true" }
