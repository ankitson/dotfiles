# Tailscale device inventory — shared metadata for the whole dotfiles repo.
#
# Loaded by chezmoi from .chezmoidata/, so every template can read `.tailscale`
# (e.g. the sshd source-address allowlist and the ~/.ssh/config Host entries).
#
# Per-device fields:
#   name      MagicDNS short name; FQDN is <name>.<tailnet>. Must match
#             `tailscale status --json` (.Peer[].DNSName) or MagicDNS won't resolve.
#   ipv4/ipv6 Stable per-node Tailscale IPs (persist for the node's registration).
#   trusted   true  -> may SSH *into* this Mac (added to the sshd allowlist).
#   ssh:      present -> this Mac can SSH *to* it (a ~/.ssh/config Host is generated).
#               user    login user (default: ankit)
#               port    ssh port (default: 22)
#               aliases extra Host aliases (the primary alias is ts-<name>)
#
# Refresh IPs with: tailscale status --json
tailscale:
  tailnet: myth-dab.ts.net
  devices:
    - name: desktop-linux
      ipv4: 100.122.168.47
      ipv6: "fd7a:115c:a1e0::253a:a82f"
      trusted: true
      ssh:
        user: ankit

    - name: desktop-win
      ipv4: 100.108.12.112
      ipv6: "fd7a:115c:a1e0::bd37:c70"
      trusted: true
      ssh:
        user: ankit
        aliases: [ts-desktop]

    - name: ts-hetzner-homelab
      ipv4: 100.109.238.111
      ipv6: "fd7a:115c:a1e0::d801:ee6f"
      trusted: false
      ssh:
        user: ankit
        port: 2201

    - name: ts-ipad-air
      ipv4: 100.108.155.116
      ipv6: "fd7a:115c:a1e0::d63a:9b74"
      trusted: true

    - name: ts-iphone-15-pro
      ipv4: 100.86.210.25
      ipv6: "fd7a:115c:a1e0::8d3a:d219"
      trusted: true
